syntax = "proto3";
package hubsync;
option go_package = "github.com/hayeah/hubsync";

message SyncEvent {
  uint64 version = 1;
  string path = 2;

  oneof event {
    FileChange change = 3;
    FileDelete delete = 4;
  }
}

message FileChange {
  EntryKind kind = 1;
  bytes digest = 2;
  uint64 size = 3;
  uint32 mode = 4;
  int64 mtime = 5;
  bytes data = 6; // inline blob for files <= 64KB; empty for large files
}

message FileDelete {}

enum EntryKind {
  FILE = 0;
  DIRECTORY = 1;
  SYMLINK = 2;
}

// --- Push ---

message PushRequest {
  repeated PushOp ops = 1;
  ConflictPolicy on_conflict = 2;
}

message PushOp {
  string path = 1;
  OpKind op = 2;
  uint64 base_version = 3;  // version this edit is based on (from hub_tree.version)
  bytes digest = 4;          // SHA-256 of new content
  bytes data = 5;            // blob content (inline)
}

enum OpKind {
  OP_CREATE = 0;
  OP_UPDATE = 1;
  OP_DELETE = 2;
}

enum ConflictPolicy {
  FAIL = 0;           // partial success, conflicts returned
  HUB_WINS = 1;       // drop conflicting client changes silently
  CLIENT_WINS = 2;    // force overwrite hub
}

message PushResponse {
  repeated PushResult results = 1;
}

message PushResult {
  string path = 1;
  oneof outcome {
    PushAccepted accepted = 2;
    PushConflict conflict = 3;
  }
}

message PushAccepted {
  uint64 version = 1;       // new version assigned by hub
}

message PushConflict {
  string reason = 1;
  uint64 current_version = 2;
  bytes current_digest = 3;
}

// --- Delta transfer ---

message DeltaRequest {
  bytes target_digest = 1;
  uint32 block_size = 2;
  repeated BlockSignature signature = 3;
}

message BlockSignature {
  uint32 index = 1;
  uint32 weak_hash = 2;
  bytes strong_hash = 3;
}

message DeltaResponse {
  bytes target_digest = 1;
  uint64 target_size = 2;
  repeated DeltaOp ops = 3;
}

message DeltaOp {
  oneof op {
    uint32 copy_index = 1;
    bytes data = 2;
  }
}
